# LibriSense Mosquitto broker configuration.
# Deploy to /etc/mosquitto/conf.d/librisense.conf on the Core Pi.
#
# Listener on all interfaces so the Edge Pi can publish. The router has
# WLAN client isolation enabled, so the Edge Pi must reach the Core via
# Ethernet (or a managed switch on the same wired segment).
#
# Anonymous auth is acceptable for the demo (LAN-only, isolated subnet).
# For production, swap to password_file or mTLS.

listener 1883 0.0.0.0
allow_anonymous true

# Persistence — keep the last retained message per topic across restarts.
persistence true
persistence_location /var/lib/mosquitto/

# Logging — systemd journal captures it via the default Debian unit.
log_dest syslog

# Connection limits — generous for a demo, conservative defaults.
max_connections -1
max_keepalive 65535
